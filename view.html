<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1f6feb">
<meta name="robots" content="noindex, nofollow">
<title>שאלוני קשב - צפייה</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>&#128203;</text></svg>">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="app">

  <!-- ============ התחברות ============ -->
  <section id="screen-login" class="screen hidden">
    <header class="hero">
      <h1>שאלוני קשב</h1>
      <p class="sub">עמוד צפייה - נדרשת התחברות</p>
    </header>

    <form class="card" id="login-form">
      <label class="field">
        <span>אימייל</span>
        <input type="email" id="email" autocomplete="username" required>
      </label>
      <label class="field">
        <span>סיסמה</span>
        <input type="password" id="password" autocomplete="current-password" required>
      </label>
      <div id="login-err" class="send-status err hidden"></div>
      <div class="actions">
        <button type="submit" class="primary" id="btn-login">כניסה</button>
      </div>
    </form>
  </section>

  <!-- ============ רשימת הטפסים ============ -->
  <section id="screen-list" class="screen hidden">
    <header class="bar">
      <div class="bar-title">
        <strong>שאלוני קשב שהתקבלו</strong>
        <small id="list-count"></small>
      </div>
      <button id="btn-logout" class="bar-btn" type="button" title="יציאה">&#9099;</button>
    </header>

    <div id="list-root"></div>
    <p class="foot-note" id="list-empty" style="display:none">
      עדיין לא התקבלו טפסים. ברגע שמישהו ינעל טופס, הוא יופיע כאן.
    </p>
  </section>

  <!-- ============ טופס בודד ============ -->
  <section id="screen-one" class="screen hidden">
    <header class="bar">
      <button id="btn-back" class="bar-btn" type="button" aria-label="חזרה">&#8594;</button>
      <div class="bar-title">
        <strong id="one-title">טופס</strong>
        <small id="one-sub"></small>
      </div>
    </header>

    <div class="card" id="one-body"></div>

    <div class="actions">
      <button type="button" id="btn-pdf" class="primary">הפקת PDF</button>
      <p class="pdf-hint">
        ייפתח חלון הדפסה. בחרו ביעד <b>"שמירה כ-PDF"</b> כדי לקבל את הקובץ לשליחה.
      </p>
    </div>
  </section>

</div>

<div id="print-root" aria-hidden="true"></div>
<div id="toast" class="toast hidden"></div>

<script src="config.js"></script>
<script src="questionnaire.js"></script>
<script src="viewer.js"></script>
</body>
</html>
